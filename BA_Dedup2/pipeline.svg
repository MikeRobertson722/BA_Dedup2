<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 480" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9673a6"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b85450"/>
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d6b656"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#82b366"/>
    </marker>
  </defs>

  <rect width="1520" height="480" fill="#fafafa" rx="8"/>
  <text x="760" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">BA Dedup2 Pipeline</text>

  <!-- INPUT FILES -->
  <rect x="30" y="55" width="280" height="185" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <rect x="30" y="55" width="280" height="24" rx="8" fill="#e8e8e8" stroke="#666" stroke-width="1.5"/>
  <text x="170" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Input Files</text>

  <rect x="45" y="90" width="250" height="60" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.2"/>
  <text x="170" y="109" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">DEC_BA_MASTER.CSV</text>
  <text x="170" y="123" text-anchor="middle" font-size="10" fill="#333">387,610 records</text>
  <text x="170" y="137" text-anchor="middle" font-size="9" fill="#888">hdrcode, ssn, hdrname, address, city, state, zip</text>

  <rect x="45" y="162" width="250" height="65" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="1.2"/>
  <text x="170" y="181" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">CANVAS_BA_MASTER_.xlsx</text>
  <text x="170" y="195" text-anchor="middle" font-size="10" fill="#333">31,695 records</text>
  <text x="170" y="209" text-anchor="middle" font-size="9" fill="#888">name, ssn, address, city, state, zip, phone, email</text>

  <!-- STEP 1 -->
  <rect x="380" y="55" width="240" height="140" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <rect x="380" y="55" width="240" height="24" rx="8" fill="#d4c4e0" stroke="#9673a6" stroke-width="1.5"/>
  <text x="500" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Step 1: load_dec_master.py</text>

  <rect x="395" y="90" width="210" height="28" rx="4" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="500" y="109" text-anchor="middle" font-size="10" fill="#333">Clean embedded newlines</text>

  <rect x="395" y="124" width="210" height="28" rx="4" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="500" y="143" text-anchor="middle" font-size="10" fill="#333">Strip SSN to digits only</text>

  <rect x="395" y="158" width="210" height="28" rx="4" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="500" y="177" text-anchor="middle" font-size="10" fill="#333">Load into SQLite + index</text>

  <!-- DATABASE -->
  <ellipse cx="500" cy="252" rx="75" ry="12" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <rect x="425" y="252" width="150" height="55" fill="#f8cecc" stroke="none"/>
  <line x1="425" y1="252" x2="425" y2="307" stroke="#b85450" stroke-width="1.5"/>
  <line x1="575" y1="252" x2="575" y2="307" stroke="#b85450" stroke-width="1.5"/>
  <ellipse cx="500" cy="307" rx="75" ry="12" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="500" y="276" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">ba_dedup.db</text>
  <text x="500" y="292" text-anchor="middle" font-size="10" fill="#666">SQLite Database</text>

  <rect x="400" y="335" width="105" height="32" rx="4" fill="#fff" stroke="#b85450" stroke-width="1"/>
  <text x="452" y="349" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">dec_ba_master</text>
  <text x="452" y="361" text-anchor="middle" font-size="8" fill="#666">387,610 rows</text>

  <rect x="515" y="335" width="120" height="32" rx="4" fill="#fff" stroke="#b85450" stroke-width="1"/>
  <text x="575" y="349" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">canvas_dec_matches</text>
  <text x="575" y="361" text-anchor="middle" font-size="8" fill="#666">31,695 rows</text>

  <!-- STEP 2 -->
  <rect x="690" y="55" width="320" height="360" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <rect x="690" y="55" width="320" height="24" rx="8" fill="#c5dbb4" stroke="#82b366" stroke-width="1.5"/>
  <text x="850" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Step 2: canvas_to_dec_match.py</text>

  <rect x="705" y="90" width="290" height="26" rx="4" fill="#d5e8d4" stroke="#82b366"/>
  <text x="850" y="108" text-anchor="middle" font-size="10" fill="#333">Read Canvas Excel</text>

  <rect x="705" y="122" width="290" height="36" rx="4" fill="#d5e8d4" stroke="#82b366"/>
  <text x="850" y="138" text-anchor="middle" font-size="10" fill="#333">Clean and validate SSN</text>
  <text x="850" y="150" text-anchor="middle" font-size="8" fill="#888">Reject: &lt;4 digits, 000/666 prefix, all-same-digit</text>

  <rect x="705" y="164" width="290" height="36" rx="4" fill="#d5e8d4" stroke="#82b366"/>
  <text x="850" y="180" text-anchor="middle" font-size="10" fill="#333">SSN Blocking</text>
  <text x="850" y="192" text-anchor="middle" font-size="8" fill="#888">Group DEC records by SSN for O(n) lookup</text>

  <!-- Matching Engine -->
  <rect x="705" y="208" width="290" height="90" rx="4" fill="#fff" stroke="#82b366" stroke-width="1.2"/>
  <text x="850" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Matching Engine</text>

  <rect x="715" y="230" width="130" height="24" rx="3" fill="#E8F5E9" stroke="#82b366"/>
  <text x="780" y="246" text-anchor="middle" font-size="9" fill="#333">Name (Jaro-Winkler)</text>

  <rect x="855" y="230" width="130" height="24" rx="3" fill="#E8F5E9" stroke="#82b366"/>
  <text x="920" y="246" text-anchor="middle" font-size="9" fill="#333">Address (PO/Street/Zip)</text>

  <rect x="715" y="260" width="270" height="24" rx="3" fill="#E8F5E9" stroke="#82b366"/>
  <text x="850" y="276" text-anchor="middle" font-size="9" fill="#333">Score and round to nearest 5 | Count possible matches</text>

  <!-- Classify Recommendation -->
  <rect x="705" y="308" width="290" height="96" rx="4" fill="#d5e8d4" stroke="#82b366"/>
  <text x="850" y="325" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Classify Recommendation</text>
  <text x="850" y="341" text-anchor="middle" font-size="8.5" fill="#444">EXISTING BA - EXISTING ADDRESS</text>
  <text x="850" y="355" text-anchor="middle" font-size="8.5" fill="#444">EXISTING BA - LIKELY SAME ADDRESS</text>
  <text x="850" y="369" text-anchor="middle" font-size="8.5" fill="#444">EXISTING BA - NEW ADDRESS</text>
  <text x="850" y="383" text-anchor="middle" font-size="8.5" fill="#444">LIKELY NEW BA | NEW BA - NO MATCH/NO SSN/INVALID</text>

  <!-- OUTPUT -->
  <rect x="1080" y="55" width="290" height="195" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <rect x="1080" y="55" width="290" height="24" rx="8" fill="#f5e6a0" stroke="#d6b656" stroke-width="1.5"/>
  <text x="1225" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Output: canvas_dec_matches.xlsx</text>

  <rect x="1095" y="90" width="260" height="42" rx="4" fill="#fff2cc" stroke="#d6b656"/>
  <text x="1225" y="106" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Matches Tab</text>
  <text x="1225" y="120" text-anchor="middle" font-size="9" fill="#444">Blue = Canvas | Tan = DEC | Red = Trust</text>

  <rect x="1095" y="140" width="260" height="36" rx="4" fill="#fff2cc" stroke="#d6b656"/>
  <text x="1225" y="156" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Summary Stats Tab</text>
  <text x="1225" y="168" text-anchor="middle" font-size="8" fill="#888">Recommendations, Auto-Add, Addresses, Trusts, Scores, States</text>

  <rect x="1095" y="184" width="260" height="36" rx="4" fill="#fff2cc" stroke="#d6b656"/>
  <text x="1225" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Data Completeness Tab</text>
  <text x="1225" y="212" text-anchor="middle" font-size="8" fill="#888">% filled per column (Green/Yellow/Red)</text>

  <!-- HUMAN REVIEW -->
  <rect x="1130" y="290" width="200" height="80" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1230" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Human Review</text>
  <text x="1230" y="332" text-anchor="middle" font-size="9.5" fill="#555">No auto-merge.</text>
  <text x="1230" y="346" text-anchor="middle" font-size="9.5" fill="#555">Reviewer uses Excel</text>
  <text x="1230" y="360" text-anchor="middle" font-size="9.5" fill="#555">to approve/reject matches.</text>

  <!-- ARROWS -->
  <line x1="295" y1="120" x2="375" y2="120" stroke="#9673a6" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="500" y1="195" x2="500" y2="238" stroke="#b85450" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="540" y="220" font-size="8" fill="#888">387K rows</text>

  <polyline points="295,194 660,194 660,103 685,103" fill="none" stroke="#d6b656" stroke-width="2" marker-end="url(#arrow-gold)"/>
  <text x="630" y="140" font-size="8" fill="#888" text-anchor="end">31.7K records</text>

  <polyline points="575,280 660,280 660,310 685,310" fill="none" stroke="#b85450" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="632" y="270" font-size="8" fill="#888" text-anchor="middle">DEC lookup</text>
  <text x="632" y="280" font-size="8" fill="#888" text-anchor="middle">by SSN</text>

  <line x1="1010" y1="150" x2="1075" y2="150" stroke="#82b366" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="1043" y="140" font-size="8" fill="#888" text-anchor="middle">Excel export</text>

  <polyline points="690,390 660,390 660,310 575,310" fill="none" stroke="#b85450" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="648" y="405" font-size="8" fill="#888" text-anchor="end">Write results</text>

  <line x1="1225" y1="250" x2="1225" y2="285" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
</svg>